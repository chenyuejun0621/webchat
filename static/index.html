<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武当修心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }
#header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
#header h1 { font-size: 18px; }
#header button { background: #333; color: #eee; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
#header button:hover { background: #444; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg .label { font-size: 11px; opacity: 0.5; margin-bottom: 4px; }
.msg.user { align-self: flex-end; background: #2563eb; }
.msg.assistant { align-self: flex-start; background: #333; }
.msg.assistant.streaming::after { content: "▊"; animation: blink 0.8s infinite; }
@keyframes blink { 50% { opacity: 0; } }
#input-area { padding: 16px 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; gap: 10px; }
#input-area textarea { flex: 1; background: #222; color: #eee; border: 1px solid #444; border-radius: 8px; padding: 10px 14px; resize: none; font-size: 15px; font-family: inherit; outline: none; }
#input-area textarea:focus { border-color: #2563eb; }
#input-area button { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 15px; cursor: pointer; }
#input-area button:hover { background: #1d4ed8; }
#input-area button:disabled { opacity: 0.5; cursor: default; }
#empty { color: #666; text-align: center; margin-top: 40vh; font-size: 14px; }
</style>
</head>
<body>

<div id="header">
  <h1>武当修心 <span style="font-size:12px;opacity:0.4;font-weight:normal;">基于 DeepSeek</span></h1>
  <button onclick="newSession()">新对话</button>
</div>

<div id="messages">
  <div id="empty">与武当修心聊聊</div>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息，Enter 发送..." onkeydown="onKeyDown(event)"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
let sessionId = null;

const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function scrollBottom() {
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? '你' : '武当修心';
  div.appendChild(label);
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  messagesDiv.appendChild(div);
  scrollBottom();
  return content;
}

function removeEmpty() {
  const el = document.getElementById('empty');
  if (el) el.remove();
}

async function send() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  sendBtn.disabled = true;
  removeEmpty();
  addMsg('user', text);

  const assistantContent = addMsg('assistant', '');
  assistantContent.parentElement.classList.add('streaming');

  try {
    const resp = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    sessionId = resp.headers.get('X-Session-Id');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留不完整的行

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          if (data.startsWith('[ERROR]')) {
            assistantContent.textContent += `[错误] ${data.slice(7)}`;
            break;
          }
          assistantContent.textContent += data;
          scrollBottom();
        }
      }
    }
  } catch (err) {
    assistantContent.textContent += `[请求失败: ${err.message}]`;
  } finally {
    assistantContent.parentElement.classList.remove('streaming');
    sendBtn.disabled = false;
    input.focus();
  }
}

function newSession() {
  sessionId = null;
  messagesDiv.innerHTML = '<div id="empty">与武当修心聊聊</div>';
}
</script>

</body>
</html>
